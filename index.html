<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0E4C89">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Regionais Royal FIC">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Desempenho Regionais — Royal FIC</title>
<style>
:root{
  --azul:#0E4C89; --azul2:#0a3a69; --laranja:#F89D1B; --laranja2:#e08a0c;
  --verde:#16a34a; --amarelo:#F89D1B; --vermelho:#dc2626;
  --bg:#eef2f6; --card:#ffffff; --ink:#16263a; --muted:#65788f; --line:#e3e9f0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-text-size-adjust:100%}
.app{max-width:560px;margin:0 auto;padding:0 0 28px}
/* HEADER */
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;
  padding:calc(env(safe-area-inset-top) + 14px) 16px 16px;position:sticky;top:0;z-index:50;
  box-shadow:0 4px 16px rgba(10,45,90,.25)}
.htop{display:flex;align-items:center;gap:12px}
.badge{background:#fff;border-radius:10px;padding:6px 9px;display:flex;align-items:center;flex:0 0 auto}
.badge img{height:24px;display:block}
.htxt{flex:1;min-width:0}
.htitle{font-size:15px;font-weight:800;letter-spacing:.2px;line-height:1.15}
.hsub{font-size:11.5px;opacity:.85;margin-top:2px}
.btn-up{background:var(--laranja);color:#3a2400;border:none;border-radius:10px;
  font-weight:800;font-size:12.5px;padding:9px 12px;display:flex;align-items:center;gap:6px;cursor:pointer}
.btn-up:active{background:var(--laranja2)}
.scopebar{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.chip-scope{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;
  border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px}
.chip-scope b{font-weight:800}
.chip-scope .x{background:rgba(255,255,255,.25);border-radius:50%;width:17px;height:17px;
  display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer}
/* CARDS */
.card{background:var(--card);border-radius:16px;margin:14px 14px 0;padding:16px;
  box-shadow:0 2px 10px rgba(20,40,70,.06)}
.card h3{margin:0 0 2px;font-size:12px;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px}
/* GAUGE */
.gauge-wrap{display:flex;flex-direction:column;align-items:center}
.gauge-svg{width:230px;max-width:78vw;height:auto;display:block;margin-top:4px}
.glabels{display:flex;justify-content:space-between;width:230px;max-width:78vw;
  font-size:11px;color:var(--muted);margin-top:-6px}
.gmeta{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.gmeta div{text-align:center}
.gmeta .v{font-size:14px;font-weight:800}
.gmeta .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;vertical-align:middle}
/* KPI CHIPS */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 14px 0}
.kpi{background:var(--card);border-radius:14px;padding:13px 13px 12px;
  box-shadow:0 2px 10px rgba(20,40,70,.06);border-left:4px solid var(--azul)}
.kpi.l{border-left-color:var(--laranja)}
.kpi .lab{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.kpi .big{font-size:21px;font-weight:800;margin-top:3px;line-height:1.05}
.kpi .unit{font-size:12px;font-weight:700;color:var(--muted)}
.kpi .sub{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:600}
.kpi .sub b{color:var(--ink)}
/* TABS */
.tabs{display:flex;gap:6px;margin:16px 14px 0;background:#dde6ef;border-radius:12px;padding:4px}
.tab{flex:1;text-align:center;font-size:12.5px;font-weight:700;color:var(--muted);
  padding:8px 4px;border-radius:9px;cursor:pointer}
.tab.on{background:#fff;color:var(--azul);box-shadow:0 1px 4px rgba(0,0,0,.08)}
/* TOGGLE */
.toggle{display:flex;gap:6px;margin:12px 14px 0;justify-content:center}
.tg{font-size:11.5px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);
  border-radius:18px;padding:6px 14px;cursor:pointer}
.tg.on{background:var(--azul);color:#fff;border-color:var(--azul)}
/* BARS */
.bars{margin:6px 14px 0}
.row{padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer}
.row:last-child{border-bottom:none}
.rhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.rname{font-size:13.5px;font-weight:800}
.rname .pct{font-size:11px;font-weight:700;margin-left:6px;padding:1px 6px;border-radius:6px}
.rval{font-size:12.5px;font-weight:700;color:var(--muted)}
.rval b{color:var(--ink)}
.track{position:relative;height:14px;background:#eef2f6;border-radius:7px;overflow:hidden}
.meta{position:absolute;top:0;left:0;height:100%;background:repeating-linear-gradient(45deg,#d7e0ea,#d7e0ea 5px,#e7edf3 5px,#e7edf3 10px)}
.fill{position:absolute;top:0;left:0;height:100%;border-radius:7px;transition:width .35s}
.metaflag{position:absolute;top:-2px;width:2px;height:18px;background:var(--azul)}
.legend{font-size:10.5px;color:var(--muted);margin:8px 14px 0;display:flex;gap:14px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
/* DIARIO */
.dia{display:flex;align-items:flex-end;gap:3px;height:150px;margin:14px 14px 0;
  border-bottom:2px solid var(--line);position:relative}
.dbar{flex:1;background:var(--azul);border-radius:4px 4px 0 0;position:relative;min-height:2px}
.dbar.we{background:#9db4cc}
.dbar.hol{background:var(--vermelho)}
.dref{position:absolute;left:0;right:0;border-top:2px dashed var(--laranja);z-index:2}
.dref .rl{position:absolute;right:0;top:-15px;font-size:9.5px;color:var(--laranja2);font-weight:700;background:var(--card);padding:0 3px}
.dlabels{display:flex;gap:3px;margin:4px 14px 0}
.dlabels span{flex:1;text-align:center;font-size:8.5px;color:var(--muted)}
footer{text-align:center;font-size:10.5px;color:var(--muted);margin-top:18px;padding:0 16px;line-height:1.5}
.hidden{display:none}
#fileIn{position:absolute;left:-9999px}
.flash{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--azul);color:#fff;
  padding:11px 18px;border-radius:24px;font-size:13px;font-weight:700;z-index:99;
  box-shadow:0 6px 20px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;pointer-events:none}
.flash.show{opacity:1}
</style>
</head>

<script>
/* ====== DADOS INICIAIS (snapshot) ====== */
let DATA = null;

/* ====== CONSTANTES (espelham o cálculo em Python) ====== */
const REG={FI09:'SP',FI10:'SP',FI13:'SP',FI22:'SP',FI27:'SP',FI01:'MT',FI04:'MT',FI30:'MT',
 FI02:'MS',FI07:'MG',FI14:'MG',FI16:'MG',FI08:'GO',FI17:'BA',FI20:'BA',FI26:'BA',FI39:'BA',FI41:'BA',
 FI24:'MA',FI34:'PE',FI06:'Sul',FI11:'Sul',FI12:'Sul'};
const PROD={101:'Gasolina A',102:'Gasolina C',103:'Gasolina C Adt',109:'Etanol',140:'Diesel S500',
 141:'Diesel S500 Adt',147:'Diesel S10',148:'Diesel S10 Adt'};
const META={SP:63617,MG:51026,MT:46600,MS:29622,BA:22600,Sul:17014,GO:8134,PE:3800,MA:1000,TO:0};
const ORDEM=['SP','MG','MT','MS','BA','Sul','GO','MA','PE','TO'];
const NOMEREG={SP:'São Paulo',MG:'Minas Gerais',MT:'Mato Grosso',MS:'Mato Grosso do Sul',
 BA:'Bahia',Sul:'Sul',GO:'Goiás',MA:'Maranhão',PE:'Pernambuco',TO:'Tocantins'};
const HOL=new Set(['2026-01-01','2026-02-16','2026-02-17','2026-04-03','2026-04-21','2026-05-01',
 '2026-06-04','2026-07-09','2026-09-07','2026-10-12','2026-11-02','2026-11-15','2026-11-20','2026-12-25']);
const CI={DATA:6,ART:7,ESCR:16,BAND2:23,VOL:24,UMR:33,MREAL:48,IDP:49};

/* ====== FORMATAÇÃO ====== */
const nf0=new Intl.NumberFormat('pt-BR',{maximumFractionDigits:0});
const nf1=new Intl.NumberFormat('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1});
const nf2=new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=x=>nf1.format((x||0)*100)+'%';

/* ====== ESTADO ====== */
let scope='BR', tab='reg', metric='vol';

/* ====== CÁLCULO (recompute ao atualizar) ====== */
function pnum(s){s=(s||'').trim();if(!s)return 0;const v=parseFloat(s.replace(/\./g,'').replace(',','.'));return isNaN(v)?0:v;}
function fmtKey(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function effDays(y,m,through){
  const last=new Date(y,m,0).getDate(); const end=through||last; let s=0;
  for(let d=1;d<=end;d++){const dt=new Date(y,m-1,d);const w=dt.getDay();
    if(HOL.has(fmtKey(y,m,d)))continue; if(w===0)continue; s+= (w===6)?0.5:1;}
  return s;
}
function seg(s){s=(s||'').trim().toUpperCase();
  if(s==='CONGENERE'||s==='N.D'||s==='N/D'||s==='ND')return 'CONGÊNERE';
  const M={'BANDEIRA BRANCA':'Bandeira Branca','CONSUMIDOR FINAL':'Consumidor Final','BANDEIRADO':'Bandeirado','USINAS':'Usinas'};
  return M[s]||s;}
function prod(a){const n=parseInt(a,10);return PROD[n]||'Outros';}

function recompute(rows){
  // datas
  let maxDay=0,Y=2026,M=6;
  for(const r of rows){const ds=r[CI.DATA];if(!ds)continue;const p=ds.split('.');
    const dd=+p[0],mm=+p[1],yy=+p[2]; if(yy>Y||(yy===Y&&mm>=M)){Y=yy;M=mm;}}
  for(const r of rows){const ds=r[CI.DATA];if(!ds)continue;const p=ds.split('.');
    if(+p[1]===M && +p[2]===Y && +p[0]>maxDay)maxDay=+p[0];}
  const effFull=effDays(Y,M), effEl=effDays(Y,M,maxDay), factor=effFull/effEl, rest=effFull-effEl;

  const A={}; const ensure=k=>A[k]||(A[k]={vol:0,lit:0,mrg:0,volHol:0,cli:new Set(),cd:new Set(),
    prod:{},seg:{},dia:{}});
  for(const r of rows){
    const rg=REG[r[CI.ESCR]]; if(!rg)continue;
    const v=pnum(r[CI.VOL]),lit=pnum(r[CI.UMR]),mg=pnum(r[CI.MREAL]),idp=r[CI.IDP],da=r[CI.DATA];
    const p=da.split('.'); const key=fmtKey(+p[2],+p[1],+p[0]); const isHol=HOL.has(key);
    for(const k of [rg,'BR']){const a=ensure(k);
      a.vol+=v;a.lit+=lit;a.mrg+=mg; if(isHol)a.volHol+=v;
      a.cli.add(idp); a.cd.add(idp+'|'+da);
      const pn=prod(r[CI.ART]); a.prod[pn]=(a.prod[pn]||0)+v;
      const sn=seg(r[CI.BAND2]); a.seg[sn]=(a.seg[sn]||0)+v;
      a.dia[da]=(a.dia[da]||0)+v;}
  }
  const dnum=s=>{const p=s.split('.');return new Date(+p[2],+p[1]-1,+p[0]).getTime();};
  const topn=o=>Object.entries(o).sort((x,y)=>y[1]-x[1]).map(([nome,vol])=>({nome,vol:+vol.toFixed(1)}));
  const diaria=o=>Object.keys(o).sort((x,y)=>dnum(x)-dnum(y)).map(k=>({data:k,vol:+o[k].toFixed(1)}));
  function pack(k,meta){const a=A[k]; if(!a)return {vol:0,lit:0,margemRL:0,clientes:0,freq:0,ticket:0,meta:meta,atingimento:0,projecao:0,projMeta:0,ritmoNec:0,ritmoAtual:0};
    const cli=a.cli.size,cd=a.cd.size,vol=a.vol,voloper=a.vol-a.volHol;
    return {vol:+vol.toFixed(1),lit:Math.round(a.lit),margemRL:a.lit?+(a.mrg/a.lit).toFixed(3):0,
      clientes:cli,freq:cli?+(cd/cli).toFixed(2):0,ticket:cd?+(vol/cd).toFixed(2):0,meta:meta,
      atingimento:meta?+(vol/meta).toFixed(4):0,projecao:+(voloper*factor).toFixed(1),
      projMeta:meta?+(voloper*factor/meta).toFixed(4):0,
      ritmoNec:meta?+(Math.max(0,meta-vol)/rest).toFixed(1):0,ritmoAtual:+(voloper/effEl).toFixed(1)};}
  const metaTot=Object.values(META).reduce((a,b)=>a+b,0);
  const regs=ORDEM.map(rg=>Object.assign({cod:rg},pack(rg,META[rg])));
  const drill={}; for(const rg of ORDEM) if(A[rg]) drill[rg]={prod:topn(A[rg].prod),seg:topn(A[rg].seg),dia:diaria(A[rg].dia)};
  const win='01-'+String(maxDay).padStart(2,'0')+'/'+['','jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][M]+'/'+Y;
  return {win:win,asof:String(maxDay).padStart(2,'0')+'.'+String(M).padStart(2,'0')+'.'+Y,
    effFull:effFull,effElapsed:effEl,factor:+factor.toFixed(4),diasRest:rest,
    br:pack('BR',metaTot),regionais:regs,
    prodNac:A['BR']?topn(A['BR'].prod):[],segNac:A['BR']?topn(A['BR'].seg):[],diaNac:A['BR']?diaria(A['BR'].dia):[],
    drill:drill};
}

/* ====== HELPERS de escopo ====== */
function curKPI(){ if(scope==='BR')return DATA.br; return DATA.regionais.find(r=>r.cod===scope)||DATA.br; }
function curProd(){ return scope==='BR'?DATA.prodNac:(DATA.drill[scope]?DATA.drill[scope].prod:[]); }
function curSeg(){ return scope==='BR'?DATA.segNac:(DATA.drill[scope]?DATA.drill[scope].seg:[]); }
function curDia(){ return scope==='BR'?DATA.diaNac:(DATA.drill[scope]?DATA.drill[scope].dia:[]); }
function statusColor(projMeta){ if(projMeta>=1)return 'var(--verde)'; if(projMeta>=0.85)return 'var(--amarelo)'; return 'var(--vermelho)'; }
function pctBadge(v){ const c=statusColor(v>=0?v:0); return c; }

/* ====== GAUGE (SVG) ====== */
function polar(cx,cy,r,deg){const a=(deg-180)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function arc(cx,cy,r,a0,a1){const[x0,y0]=polar(cx,cy,r,a0);const[x1,y1]=polar(cx,cy,r,a1);
  const large=(a1-a0)>180?1:0;return `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;}
function renderGauge(){
  const k=curKPI(); const ating=k.atingimento||0, projm=k.projMeta||0;
  const maxPct=Math.max(1.2, Math.ceil(Math.max(ating,projm)*10)/10);
  document.getElementById('gmax').textContent=nf0.format(maxPct*100)+'%';
  const cx=100,cy=100,r=80;
  const ang=p=>Math.min(p/maxPct,1)*180;
  let s='';
  s+=`<path d="${arc(cx,cy,r,0,180)}" fill="none" stroke="#e6edf4" stroke-width="16" stroke-linecap="round"/>`;
  if(ating>0) s+=`<path d="${arc(cx,cy,r,0,ang(ating))}" fill="none" stroke="var(--laranja)" stroke-width="16" stroke-linecap="round"/>`;
  // marcador projeção
  const pa=ang(projm); const[mx0,my0]=polar(cx,cy,r-12,pa);const[mx1,my1]=polar(cx,cy,r+12,pa);
  s+=`<line x1="${mx0}" y1="${my0}" x2="${mx1}" y2="${my1}" stroke="var(--azul)" stroke-width="3.5"/>`;
  s+=`<text x="${cx}" y="${cy-14}" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">${pct(ating)}</text>`;
  s+=`<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="11" fill="var(--muted)">da meta · ${DATA.win}</text>`;
  document.getElementById('gauge').innerHTML=s;
  document.getElementById('gaugeTitle').textContent=(scope==='BR'?'Brasil':NOMEREG[scope]||scope)+' — Atingimento da meta';
  document.getElementById('gAcum').textContent=nf0.format(k.vol)+' m³';
  document.getElementById('gProj').textContent=nf0.format(k.projecao)+' m³';
  document.getElementById('gMeta').textContent=k.meta?nf0.format(k.meta)+' m³':'—';
}

/* ====== KPIs ====== */
function renderKPIs(){
  const k=curKPI();
  const html=`
   <div class="kpi"><div class="lab">Volume acumulado</div>
     <div class="big">${nf0.format(k.vol)} <span class="unit">m³</span></div>
     <div class="sub">Atingimento <b>${pct(k.atingimento)}</b></div></div>
   <div class="kpi l"><div class="lab">Projeção fim de mês</div>
     <div class="big">${nf0.format(k.projecao)} <span class="unit">m³</span></div>
     <div class="sub">Ritmo nec. <b>${nf0.format(k.ritmoNec)}</b> m³/dia</div></div>
   <div class="kpi"><div class="lab">Margem</div>
     <div class="big">${nf2.format(k.margemRL)} <span class="unit">R$/L</span></div>
     <div class="sub">Proj. vs meta <b>${pct(k.projMeta)}</b></div></div>
   <div class="kpi l"><div class="lab">Clientes</div>
     <div class="big">${nf0.format(k.clientes)}</div>
     <div class="sub">Freq <b>${nf2.format(k.freq)}</b> · Ticket <b>${nf1.format(k.ticket)}</b></div></div>`;
  document.getElementById('kpis').innerHTML=html;
}

/* ====== CONTEÚDO (abas) ====== */
function renderContent(){
  const c=document.getElementById('content');
  document.getElementById('toggle').style.display = (tab==='reg')?'flex':'none';
  if(tab==='reg') c.innerHTML=barsRegionais();
  else if(tab==='prod') c.innerHTML=barsSimples(curProd(),'Produto');
  else if(tab==='seg') c.innerHTML=barsSimples(curSeg(),'Segmento');
  else c.innerHTML=diario();
  if(tab==='reg'){ c.querySelectorAll('.row[data-reg]').forEach(el=>
    el.onclick=()=>{ setScope(el.getAttribute('data-reg')); }); }
}
function barsRegionais(){
  const regs=DATA.regionais.filter(r=>r.cod!=='TO' || r.vol>0);
  let valf,bgf,labf,scaleMax;
  if(metric==='vol'){ valf=r=>r.vol; bgf=r=>r.meta; labf=r=>`<b>${nf0.format(r.vol)}</b> m³ · ${pct(r.atingimento)}`; }
  else if(metric==='proj'){ valf=r=>r.projecao; bgf=r=>r.meta; labf=r=>`<b>${nf0.format(r.projecao)}</b> m³ · ${pct(r.projMeta)}`; }
  else { valf=r=>r.margemRL; bgf=r=>0; labf=r=>`<b>${nf2.format(r.margemRL)}</b> R$/L`; }
  scaleMax=Math.max(...regs.map(r=>Math.max(valf(r),bgf(r))),0.0001);
  let rows=regs.map(r=>{
    const val=valf(r),bg=bgf(r); const col=(metric==='mrg')?'var(--azul)':statusColor(r.projMeta);
    const wv=Math.min(val/scaleMax*100,100), wb=Math.min(bg/scaleMax*100,100);
    const badge=(metric==='mrg')?'':`<span class="pct" style="background:${statusColor(r.projMeta)}22;color:${statusColor(r.projMeta)}">${pct(metric==='proj'?r.projMeta:r.atingimento)}</span>`;
    const flag=(metric!=='mrg'&&bg>0)?`<span class="metaflag" style="left:${wb}%"></span>`:'';
    return `<div class="row" data-reg="${r.cod}">
      <div class="rhead"><div class="rname">${NOMEREG[r.cod]||r.cod}${badge}</div>
        <div class="rval">${labf(r)}</div></div>
      <div class="track">${(metric!=='mrg'&&bg>0)?`<div class="meta" style="width:${wb}%"></div>`:''}
        <div class="fill" style="width:${wv}%;background:${col}"></div>${flag}</div></div>`;
  }).join('');
  const leg=(metric==='mrg')?'':`<div class="legend">
    <span><span class="dot" style="background:var(--verde)"></span>Proj. ≥ meta</span>
    <span><span class="dot" style="background:var(--amarelo)"></span>85–100%</span>
    <span><span class="dot" style="background:var(--vermelho)"></span>&lt; 85%</span>
    <span>▏ marca = meta</span></div>`;
  return `<div class="bars">${rows}</div>${leg}`;
}
function barsSimples(items,titulo){
  if(!items||!items.length)return '<div class="bars"><div class="row">Sem dados.</div></div>';
  const tot=items.reduce((a,b)=>a+Math.max(b.vol,0),0)||1;
  const mx=Math.max(...items.map(i=>i.vol),0.0001);
  const rows=items.map((i,idx)=>{
    const col=idx===0?'var(--laranja)':'var(--azul)';
    const w=Math.min(Math.max(i.vol,0)/mx*100,100);
    return `<div class="row" style="cursor:default">
      <div class="rhead"><div class="rname">${i.nome}</div>
        <div class="rval"><b>${nf0.format(i.vol)}</b> m³ · ${pct(i.vol/tot)}</div></div>
      <div class="track"><div class="fill" style="width:${w}%;background:${col}"></div></div></div>`;
  }).join('');
  return `<div class="bars">${rows}</div>`;
}
function diario(){
  const dd=curDia(); const k=curKPI();
  if(!dd.length)return '<div class="bars"><div class="row">Sem dados.</div></div>';
  const mx=Math.max(...dd.map(d=>d.vol),1);
  const ref=k.meta?k.meta/DATA.effFull:0; // ritmo de meta por dia efetivo
  const refH=ref>0?Math.min(ref/mx*100,100):0;
  const bars=dd.map(d=>{const p=d.data.split('.');const dt=new Date(+p[2],+p[1]-1,+p[0]);const w=dt.getDay();
    const key=p[2]+'-'+p[1]+'-'+p[0]; const cls=HOL.has(key)?'hol':((w===0||w===6)?'we':'');
    const h=Math.max(d.vol/mx*100,1);
    return `<div class="dbar ${cls}" style="height:${h}%" title="${d.data}: ${nf0.format(d.vol)} m³"></div>`;}).join('');
  const labs=dd.map(d=>`<span>${d.data.slice(0,2)}</span>`).join('');
  const refLine=ref>0?`<div class="dref" style="bottom:${refH}%"><span class="rl">meta/dia ${nf0.format(ref)}</span></div>`:'';
  return `<div class="dia">${bars}${refLine}</div><div class="dlabels">${labs}</div>
    <div class="legend"><span><span class="dot" style="background:var(--azul)"></span>dia útil</span>
    <span><span class="dot" style="background:#9db4cc"></span>fim de semana</span>
    <span><span class="dot" style="background:var(--vermelho)"></span>feriado</span></div>`;
}

/* ====== SCOPE BAR ====== */
function renderScope(){
  const sb=document.getElementById('scopebar');
  if(scope==='BR'){ sb.innerHTML=`<span class="chip-scope"><b>Brasil</b> · 10 regionais</span>`; }
  else { sb.innerHTML=`<span class="chip-scope"><b>${NOMEREG[scope]||scope}</b>
    <span class="x" id="reset">✕</span></span>
    <span class="chip-scope" id="toBr" style="cursor:pointer">Ver Brasil</span>`;
    sb.querySelector('#reset').onclick=()=>setScope('BR');
    sb.querySelector('#toBr').onclick=()=>setScope('BR'); }
}
function setScope(s){ scope=s; renderAll(); }

/* ====== RENDER ALL ====== */
function vis(id,show){var e=document.getElementById(id);if(e)e.style.display=show?'':'none';}
function renderEmpty(){
  vis('gaugeCard',false); vis('kpis',false); vis('tabs',false);
  document.getElementById('toggle').style.display='none';
  document.getElementById('hsub').textContent='Toque em \u21BB Atualizar para carregar a base';
  document.getElementById('scopebar').innerHTML='';
  document.getElementById('content').innerHTML=
   '<div class="card" style="text-align:center;padding:36px 22px">'
   +'<div style="font-size:46px;color:var(--laranja);line-height:1">&#10227;</div>'
   +'<div style="font-size:15px;font-weight:800;margin-top:12px">Nenhum dado carregado</div>'
   +'<div style="font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.55">Toque em <b>Atualizar</b> e selecione o arquivo <b>YVIEWCOPA.CSV</b> que o backup mantem no seu OneDrive. O painel e montado no proprio aparelho &mdash; nenhum numero fica neste site.</div>'
   +'<button id="emptyBtn" class="btn-up" style="margin:20px auto 0;background:var(--azul);color:#fff">&#10227;&nbsp; Carregar YVIEWCOPA.CSV</button>'
   +'</div>';
  var b=document.getElementById('emptyBtn'); if(b) b.onclick=function(){document.getElementById('fileIn').click();};
  document.getElementById('footer').innerHTML='Royal FIC \u00b7 Intelig\u00eancia Comercial \u00b7 Base YVIEWCOPA<br>App sem dados embutidos \u2014 os n\u00fameros aparecem s\u00f3 ap\u00f3s carregar o arquivo neste aparelho.';
}
function renderAll(){ if(!DATA){renderEmpty();return;}
  vis('gaugeCard',true); vis('kpis',true); vis('tabs',true);
  renderScope(); renderGauge(); renderKPIs(); renderContent();
  document.getElementById('hsub').textContent=DATA.win+' · vs Meta e Projeção';
  document.getElementById('footer').innerHTML=
    `Royal FIC · Inteligência Comercial · Base YVIEWCOPA<br>Janela ${DATA.win} · ${DATA.effElapsed} de ${DATA.effFull} dias úteis · fator ${nf2.format(DATA.factor)}× · margem em R$/L · volume em m³`;
}

/* ====== EVENTOS ====== */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on'); tab=t.getAttribute('data-t'); renderContent();});
document.querySelectorAll('.tg').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tg').forEach(x=>x.classList.remove('on'));
  t.classList.add('on'); metric=t.getAttribute('data-m'); renderContent();});

/* ====== ATUALIZAR DADOS ====== */
const flash=(msg)=>{const f=document.getElementById('flash');f.textContent=msg;f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'),2600);};
document.getElementById('btnUp').onclick=()=>document.getElementById('fileIn').click();
document.getElementById('fileIn').onchange=function(e){
  const file=e.target.files[0]; if(!file)return;
  flash('Lendo '+file.name+' …');
  const rd=new FileReader();
  rd.onload=function(){
    try{
      let txt=rd.result;
      const lines=txt.split(/\r?\n/).filter(l=>l.length>0);
      const rows=lines.slice(1).map(l=>l.split(';'));
      const nd=recompute(rows);
      if(!nd.br.vol){ flash('Arquivo sem dados reconhecidos.'); return; }
      DATA=nd; scope='BR'; renderAll();
      flash('Atualizado: '+DATA.win);
    }catch(err){ flash('Erro ao ler o arquivo.'); console.error(err); }
  };
  rd.onerror=()=>flash('Não consegui ler o arquivo.');
  rd.readAsText(file,'ISO-8859-1');
  e.target.value='';
};

/* ====== SERVICE WORKER (instalável/offline) ====== */
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}

/* ====== re-render em rotação ====== */
window.addEventListener('orientationchange',()=>setTimeout(renderAll,250));
window.addEventListener('resize',()=>{clearTimeout(window._rz);window._rz=setTimeout(renderAll,200);});

renderAll();
</script>
